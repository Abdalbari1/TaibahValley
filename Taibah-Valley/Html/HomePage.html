<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-src https://www.google.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- Primary SEO -->
  <title>Taibah Valley — Madinah's Home for Deep-Tech Innovation</title>
  <meta name="description" content="Taibah Valley is Madinah's innovation hub, established by Taibah University. We support startups, students, investors and partners with incubation, labs, training and a deep-tech venture pipeline.">
  <meta name="keywords" content="Taibah Valley, Madinah innovation hub, Taibah University, startups Saudi Arabia, deep tech, blockchain lab, IoT lab, AR VR lab, Vision 2030">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Taibah Valley">
  <link rel="canonical" href="https://www.taibahvalley.com.sa/">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Taibah Valley — Madinah's Home for Deep-Tech Innovation">
  <meta property="og:description" content="Madinah's innovation hub — incubation, labs, training and a deep-tech venture pipeline, in line with Saudi Vision 2030.">
  <meta property="og:url" content="https://www.taibahvalley.com.sa/">
  <meta property="og:image" content="../Images/logo-white.png">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Taibah Valley — Madinah's Home for Deep-Tech Innovation">
  <meta name="twitter:description" content="Incubation, labs and training for startups, students, investors and partners in Madinah.">

  <link rel="icon" href="../Images/logo-white.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header">
    <a class="logo" href="#top" aria-label="Taibah Valley home">
      <img src="../Images/logo-white.png" alt="Taibah Valley logo" width="160" height="40">
    </a>
    <nav aria-label="Primary">
      <ul class="nav-links" id="nav-links"></ul>
    </nav>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme">
        <span class="knob" aria-hidden="true">
          <svg class="icon-moon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#341a52" stroke-width="2.4" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"></path></svg>
          <svg class="icon-sun" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#341a52" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"></path></svg>
        </span>
      </button>
      <button class="pill-btn" id="lang-toggle" type="button" aria-label="Switch language">
        <span id="lang-pill"></span>
      </button>
      <button class="btn-primary" id="login-btn" type="button"></button>
      <button class="btn-primary" id="contact-btn" type="button"></button>
    </div>
  </header>

  <main id="main-content">
    <p id="load-status" role="status"></p>

    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-media" id="hero-media"></div>
      <div class="hero-card">
        <h1 id="hero-title"></h1>
        <p id="hero-sub"></p>
        <div class="hero-actions">
          <button class="btn-primary" id="hero-cta1" type="button"></button>
          <button class="btn-secondary" id="hero-cta2" type="button"></button>
        </div>
      </div>
    </section>

    <section class="about" aria-labelledby="about-title">
      <div class="about-copy">
        <p class="kicker" id="about-kicker"></p>
        <h2 id="about-title"></h2>
        <p id="about-body"></p>
        <ul class="stats" id="stats-list"></ul>
      </div>
      <div class="about-media">
        <img id="about-img" alt="" loading="lazy" width="640" height="320">
      </div>
    </section>

    <section class="section" aria-labelledby="services-title">
      <div class="section-head">
        <h2 id="services-title"></h2>
        <button class="section-link" id="services-all" type="button "></button>
      </div>
      <div class="services-grid" id="labs-grid"></div>
    </section>

    <section class="partners" aria-labelledby="partners-title">
      <h2 id="partners-title"></h2>
      <ul class="partners-grid" id="partners-grid"></ul>
    </section>

    <section class="partners" aria-labelledby="clients-title">
      <h2 id="clients-title"></h2>
      <ul class="partners-grid" id="clients-grid"></ul>
    </section>

    <section class="section" aria-labelledby="news-title">
      <div class="section-head">
        <h2 id="news-title"></h2>
        <button class="section-link" id="news-all" type="button"></button>
      </div>
      <div class="news-grid" id="news-grid"></div>
    </section>

    <section class="contact" id="contact" aria-labelledby="contact-title">
      <form class="contact-form" id="contact-form" novalidate>
        <h2 id="contact-title"></h2>
        <label class="contact-field">
          <span class="field-label"><span class="required" aria-hidden="true">*</span><span id="contact-label-name"></span></span>
          <input type="text" id="contact-name" name="name" required autocomplete="name">
        </label>
        <label class="contact-field">
          <span class="field-label"><span class="required" aria-hidden="true">*</span><span id="contact-label-email"></span></span>
          <input type="email" id="contact-email-input" name="email" required autocomplete="email">
        </label>
        <label class="contact-field">
          <span class="field-label"><span class="required" aria-hidden="true">*</span><span id="contact-label-message"></span></span>
          <textarea id="contact-message" name="message" rows="4" required></textarea>
        </label>
        <button class="btn-primary" id="contact-submit" type="submit"></button>
        <p id="contact-form-status" role="status"></p>
      </form>
      <div class="contact-info">
        <div class="contact-map">
          <iframe id="contact-map-frame" src="https://www.google.com/maps?q=Taibah+Valley,+Madinah,+Saudi+Arabia&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <address class="contact-address">
          <p id="contact-addr-1"></p>
          <p id="contact-addr-2"></p>
          <a id="contact-phone" href="#" dir="ltr"></a>
          <a id="contact-email" href="#" dir="ltr"></a>
        </address>
      </div>
    </section>
  </main>

    <footer class="site-footer">
        <div class="footer-grid">
            <div class="footer-brand">
                <img src="../Images/logo-white.png" alt="Taibah Valley logo" width="168" height="42" />
                <p id="footer-blurb"></p>
                <div class="social-links">

                ></path>
                
              </svg>
                    </a>
                    <a href="https://www.linkedin.com/company/taibahvalley" target="_blank" rel="noopener noreferrer" aria-label="Taibah Valley on LinkedIn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  d="M20.4 3H3.6A.6.6 0 0 0 3 3.6v16.8a.6.6 0 0 0 .6.6h16.8a.6.6 0 0 0 .6-.6V3.6a.6.6 0 0 0-.6-.6ZM8.3 18.4H5.7V9.6h2.6v8.8ZM7 8.4a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm11.4 10h-2.6v-4.3c0-1-.02-2.3-1.4-2.3-1.4 0-1.6 1.1-1.6 2.2v4.4h-2.6V9.6h2.5v1.2h.04a2.8 2.8 0 0 1 2.5-1.4c2.7 0 3.2 1.8 3.2 4v5Z"
                ></path>
              </svg>
                    </a>
                    <a href="https://www.instagram.com/taibahvalley/" target="_blank" rel="noopener noreferrer" aria-label="Taibah Valley on Instagram">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                <circle cx="12" cy="12" r="4"></circle>
                <circle
                  cx="17.2"
                  cy="6.8"
                  r="1.1"
                  fill="currentColor"
                  stroke="none"
                ></circle>
              </svg>
                    </a>
                    <a href="https://www.youtube.com/channel/UCkuzLmaLDHSCVIvfvR09JUw?view_as=subscriber" target="_blank" rel="noopener noreferrer" aria-label="Taibah Valley on YouTube">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                  fill-rule="evenodd"
                  d="M23.5 6.5a3 3 0 0 0-2.1-2.1C19.5 3.8 12 3.8 12 3.8s-7.5 0-9.4.6A3 3 0 0 0 .5 6.5 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.5 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.5ZM9.7 15.5V8.5L15.8 12l-6.1 3.5Z"
                ></path>
              </svg>
                    </a>
                    <a href="https://www.snapchat.com/@taibahvalley?sender_web_id=3c002136-fa32-47ec-96d3-b4f9e8361029&device_type=desktop&is_copy_url=true" target="_blank" rel="noopener noreferrer" aria-label="Taibah Valley on Snapchat">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path
                  d="M12 3c3.5 0 6 2.8 6 6.5 0 2-.3 3.6-.9 5 1 .4 2 .7 2.9.7-.2.9-1.3 1.6-2.5 2 .2.6.6 1.1 1.1 1.5-1 .5-2.1.6-3.1.4-.6 1.1-1.9 1.9-3.5 1.9s-2.9-.8-3.5-1.9c-1 .2-2.1.1-3.1-.4.5-.4.9-.9 1.1-1.5-1.2-.4-2.3-1.1-2.5-2 .9 0 1.9-.3 2.9-.7-.6-1.4-.9-3-.9-5C6 5.8 8.5 3 12 3Z"
                ></path>
                <circle cx="9.3" cy="10" r="0.6" fill="currentColor" stroke="none"></circle>
                <circle cx="14.7" cy="10" r="0.6" fill="currentColor" stroke="none"></circle>
              </svg>
                    </a>
                </div>
            </div>
            <div class="footer-col">
                <h3 id="footer-services-title"></h3>
                <ul id="footer-services-list"></ul>
            </div>
            <div class="footer-col">
                <h3 id="footer-valley-title"></h3>
                <ul id="footer-valley-list"></ul>
            </div>
            <div class="footer-col">
                <h3 id="footer-policies-title"></h3>
                <ul id="footer-policies-list"></ul>
            </div>
            <div class="footer-contact">
                <h3 id="footer-contact-title"></h3>
                <a id="footer-email" href="#" dir="ltr"></a>
                <a id="footer-phone" href="#" dir="ltr"></a>
            </div>
        </div>
        <div class="footer-bottom" id="footer-copyright"></div>
    </footer>

  <script src="../JS/HomePage.js" defer></script>
</body>
</html>
